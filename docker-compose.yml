services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Hr
    ports: ["3306:3306"]
  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/Hr?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: ZXrysCo4toyjtt3LKTLm7XAhIKX707lTaROtMwPX5SU=
      CORS_ALLOWED_ORIGINS: http://localhost:8080
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports: ["8081:8081"]
    depends_on: [mysql]
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8081
    ports: ["8080:80"]
    depends_on: [backend]
