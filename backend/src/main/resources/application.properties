spring.application.name=backend

# ===============================
# CONFIGURATION MYSQL
# ===============================
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/Hr?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Fallback de dev uniquement (jamais utilisé si le profil "prod" est actif, voir
# application-prod.properties qui exige JWT_SECRET sans filet de secours).
jwt.secret=${JWT_SECRET:ZmGDi6enag9aJKFJjVqhW/eK/C1B5TjLLzh6BC8fhXP1mhFBEq/TUc92JqZdNzDN}
jwt.expiration=86400000

# ===============================
# =   CORS
# ===============================
# Origines autorisées (patterns séparés par des virgules). Par défaut : plage locale de
# Vite. En prod, surchargé obligatoirement via CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# Base du frontend utilisée pour construire le lien de réinitialisation de mot de passe
# (PasswordResetService) - jamais deviné depuis la requête (Host peut être spoofé), toujours
# une valeur de config explicite. En prod, surchargé via FRONTEND_BASE_URL.
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# ===============================
# =   SEED DE DONNÉES DE DÉMO
# ===============================
# Actif par défaut en dev. Forcé à false en prod (application-prod.properties) quelle que
# soit la config d'environnement, pour qu'il ne puisse jamais tourner sur une vraie base.
app.seed-demo-data=true

# ===============================
# =   AI PROVIDER (Ollama)
# ===============================
ai.provider=ollama

ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.1:latest}

# ===============================
# =   EMAIL NOTIFICATIONS (SMTP)
# ===============================
notifications.mail.enabled=true
notifications.mail.recruitment.cc=
# Pas de credentials SMTP en dev local -> le health indicator mail échoue l'auth et fait
# passer /actuator/health global à DOWN (liveness/readiness restent UP, donc K8s n'est pas
# impacté). Désactivé ici uniquement ; prod (application-prod.properties) a de vrais
# identifiants et n'a pas besoin de ce flag.
management.health.mail.enabled=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# =   PAYROLL / ABSENCES
# ===============================
payroll.absence.quota-days=2.5
# Plafond de jours reportables d'une année sur l'autre. -1 = pas de plafond (report intégral).
payroll.absence.carryover-cap-days=-1

# ===============================
# =   ACTUATOR / PROMETHEUS
# ===============================
# Seuls health et prometheus sont exposés (pas env/beans/heapdump) ; /actuator/health/**
# et /actuator/prometheus sont ouverts sans authentification dans SecurityConfig pour les
# probes Kubernetes et le scrape Prometheus.
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=when-authorized
management.prometheus.metrics.export.enabled=true
