# ===============================
# SURCHARGES DE PRODUCTION
# Activation : SPRING_PROFILES_ACTIVE=prod (ou -Dspring-boot.run.profiles=prod)
#
# Chaque valeur ci-dessous est OBLIGATOIRE et n'a AUCUN filet de secours : si la variable
# d'environnement correspondante n'est pas définie, le démarrage échoue immédiatement au
# lieu de démarrer silencieusement avec une config non sécurisée. C'est voulu.
# ===============================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

jwt.secret=${JWT_SECRET}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Le seeder de démo ne doit jamais tourner sur une base de production : valeur figée
# (et non pilotée par une variable d'environnement) pour qu'aucune mauvaise config ne
# puisse la réactiver par accident.
app.seed-demo-data=false
