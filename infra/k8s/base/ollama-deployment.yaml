apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-ollama
  namespace: hr
  labels:
    app: hr-ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hr-ollama
  template:
    metadata:
      labels:
        app: hr-ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          envFrom:
            - configMapRef:
                name: hr-backend-config
          # L'image ollama/ollama ne contient aucun modèle au démarrage : on le télécharge
          # une fois le serveur prêt (persisté ensuite dans le PVC /root/.ollama, donc pas
          # re-téléchargé aux redémarrages suivants tant que le modèle ne change pas).
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    for i in $(seq 1 60); do
                      curl -sf http://localhost:11434/api/tags >/dev/null && break
                      sleep 2
                    done
                    curl -s http://localhost:11434/api/pull -d "{\"name\": \"${OLLAMA_MODEL}\"}"
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "1500m"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: hr-ollama-models
