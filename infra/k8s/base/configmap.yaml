apiVersion: v1
kind: ConfigMap
metadata:
  name: hr-backend-config
  namespace: hr
data:
  # Le profil "prod" (application-prod.properties) est utilisé partout, y compris pour
  # l'overlay "dev" - il exige les secrets explicitement, jamais de config par défaut non
  # sécurisée. Voir docs/deployment/03-secrets.md pour DB_URL/DB_USERNAME/DB_PASSWORD/JWT_SECRET.
  SPRING_PROFILES_ACTIVE: "prod"
  # Surchargé par overlay (voir overlays/*/patch-configmap.yaml)
  CORS_ALLOWED_ORIGINS: "https://CHANGE_ME.example.com"
  # hr-ollama = nom du Service (voir ollama-service.yaml), résolu via le DNS interne du cluster.
  OLLAMA_BASE_URL: "http://hr-ollama:11434"
  # Modèle volontairement petit (~2 Go quantifié) pour tenir sur le nœud partagé
  # e2-standard-2 (8 Go) à côté de backend/frontend/Argo CD/monitoring - voir
  # docs/deployment/07-checklist-securite-budget.md. llama3.1:latest (8B, ~4,7 Go) reste
  # utilisable mais nettement plus tendu en mémoire sur ce nœud.
  OLLAMA_MODEL: "llama3.2:3b"
