apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hr-ingress
  namespace: hr
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hr.human-edge.dev
        - api.hr.human-edge.dev
      secretName: hr-tls
  rules:
    - host: hr.human-edge.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hr-frontend
                port:
                  number: 80
    - host: api.hr.human-edge.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hr-backend
                port:
                  number: 8081
