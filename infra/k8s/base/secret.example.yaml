# Documentation uniquement - PAS appliqué, PAS référencé dans kustomization.yaml.
# Le vrai Secret "hr-backend-secrets" est produit chiffré (SealedSecret) par overlay,
# voir docs/deployment/03-secrets.md. Ce fichier ne fait que lister les clés attendues.
apiVersion: v1
kind: Secret
metadata:
  name: hr-backend-secrets
  namespace: hr
type: Opaque
stringData:
  DB_URL: "jdbc:mysql://<mysql_server_fqdn>:3306/Hr?useSSL=true&serverTimezone=UTC"
  DB_USERNAME: "hradmin"
  DB_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME_random_64_bytes_base64"
  MAIL_USERNAME: "CHANGE_ME@gmail.com"
  MAIL_PASSWORD: "CHANGE_ME_app_password"
