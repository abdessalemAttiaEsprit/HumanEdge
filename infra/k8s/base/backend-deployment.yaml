apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-backend
  namespace: hr
  labels:
    app: hr-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hr-backend
  template:
    metadata:
      labels:
        app: hr-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      # Le conteneur tourne en non-root (uid/gid 999, voir backend/Dockerfile) - fsGroup force
      # Kubernetes à chown le volume PVC monté (/app/uploads) au groupe 999 au montage, sinon
      # le PVC est monté root:root par défaut et le process n'a pas le droit d'écrire dessus
      # (AccessDeniedException à l'upload de CV).
      securityContext:
        fsGroup: 999
      containers:
        - name: backend
          # Remplacé par overlay (images: dans kustomization.yaml) puis par la CI (tag = SHA du commit)
          image: docker.io/CHANGE_ME/hr-backend:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: hr-backend-config
            - secretRef:
                name: hr-backend-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 750m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: hr-backend-uploads
