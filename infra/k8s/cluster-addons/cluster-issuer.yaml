# Cluster-scoped, hors du périmètre Argo CD (qui gère infra/k8s/overlays/prod) - appliqué
# manuellement une fois, après l'installation de cert-manager. Voir
# docs/deployment/04-kubernetes-gitops.md.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: lightsquare8888@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
